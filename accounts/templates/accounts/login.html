{% extends 'base_auth.html' %}

{% block form_container %}
  <form method="POST">
    {% csrf_token %}
    <label for="username">
      <span>Nome de Usuário:</span>
      <input type="text" id="username" name="username" placeholder="Ex: José2007" />
    </label>
    <label for="password">
      <span>Senha:</span>
      <input type="password" id="password" name="password" placeholder="Ex: ********" />
    </label>

    {% if messages %}
      {% for message in messages %}
        <p>{{ message }}</p>
      {% endfor %}
    {% endif %}
    <a href="{% url 'auth:register' %}">Não tem uma conta? Registre-se.</a>

    <button type="submit">Login</button>
  </form>
{% endblock %}
